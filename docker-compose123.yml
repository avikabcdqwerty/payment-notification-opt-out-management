version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: payment_notifications_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: payment_notifications
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: payment_notifications_backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 4000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: payment_notifications
      JWT_SECRET: changeme
      CLIENT_ORIGIN: http://localhost:3000
      TYPEORM_SYNC: "true"
      TYPEORM_LOGGING: "true"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/usr/src/app
    command: ["npm", "run", "start:dev"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: payment_notifications_frontend
    restart: unless-stopped
    environment:
      REACT_APP_API_BASE_URL: http://localhost:4000/api
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/usr/src/app
    depends_on:
      - backend
    command: ["npm", "start"]

volumes:
  postgres_data: